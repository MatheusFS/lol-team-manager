<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partida – Clash Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    .field-label {
      display: block;
      font-size: 0.75rem;
      line-height: 1rem;
      color: #94a3b8;
      margin-bottom: 0.25rem;
    }
    .field-input {
      width: 100%;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.25rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
      margin-top: 0.25rem;
      outline: none;
    }
    .field-input:focus { border-color: #eab308; }
    select.field-input { cursor: pointer; }
  </style>
  <script src="/scripts/shared.js"></script>
  <script src="/scripts/match-form.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="matchForm" class="bg-slate-950 text-slate-100 min-h-screen pb-24">
<script src="/scripts/layout.js"></script>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <div class="flex items-center gap-3 mb-6">
      <a href="/index.html" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Voltar</a>
      <h1 class="text-xl font-bold" x-text="pageTitle"></h1>
      <a :href="`/pages/match-lookup.html${editId ? '?returnId=' + editId : ''}`"
         class="ml-auto text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-3 py-1.5 rounded transition-colors">
        🔍 Buscar partida
      </a>
    </div>

    <!-- ── Informações ─────────────────────────────────────────────────── -->
    <section class="bg-slate-900 border border-slate-800 rounded-lg p-5 mb-5">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Informações</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">

        <div>
          <label class="field-label">Data</label>
          <input type="date" x-model="date" required class="field-input">
        </div>

        <div>
          <label class="field-label">Partida #</label>
          <input type="number" x-model.number="game_n" min="1" max="10" required class="field-input">
        </div>

        <div>
          <label class="field-label">Resultado</label>
          <div class="flex rounded overflow-hidden border border-slate-700 h-9 mt-1">
            <button type="button" @click="win = true"
                    class="flex-1 text-sm font-semibold transition-colors"
                    :class="win === true ? 'bg-green-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-green-500/20'">
              VITÓRIA
            </button>
            <button type="button" @click="win = false"
                    class="flex-1 text-sm font-semibold transition-colors"
                    :class="win === false ? 'bg-red-700 text-white' : 'bg-slate-800 text-slate-400 hover:bg-red-500/20'">
              DERROTA
            </button>
          </div>
        </div>

        <div>
          <label class="field-label">Lado</label>
          <div class="flex rounded overflow-hidden border border-slate-700 h-9 mt-1">
            <button type="button" @click="side = 'Red'"
                    class="flex-1 text-sm transition-colors"
                    :class="side === 'Red' ? 'bg-red-700 text-white' : 'bg-slate-800 text-slate-400 hover:bg-red-500/20'">
              🟥 Red
            </button>
            <button type="button" @click="side = 'Blue'"
                    class="flex-1 text-sm transition-colors"
                    :class="side === 'Blue' ? 'bg-blue-700 text-white' : 'bg-slate-800 text-slate-400 hover:bg-blue-500/20'">
              🟦 Blue
            </button>
          </div>
        </div>

      </div>
    </section>

    <!-- ── Escalação ──────────────────────────────────────────────────── -->
    <section class="bg-slate-900 border border-slate-800 rounded-lg p-5 mb-5">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Escalação</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">

        <div>
          <label class="field-label">Top Laner</label>
          <select x-model="topPlayer" class="field-input">
            <option value="">— nenhum —</option>
            <template x-for="p in PLAYERS" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </div>

        <!-- Our champions -->
        <div>
          <label class="field-label mb-2 block">Nossos Campeões</label>
          <div class="space-y-1.5">
            <template x-for="(slot, i) in ourChamps" :key="i">
              <div class="flex items-center gap-2">
                <span class="text-xs text-slate-500 w-12 text-right" x-text="ROLES[i]"></span>
                <div class="relative flex-1">
                  <!-- icon overlay when champion is selected -->
                  <img x-show="slot.key"
                       :src="$store.champions.imgUrl(slot.key)"
                       class="absolute left-1.5 top-1/2 -translate-y-1/2 z-10 w-5 h-5 rounded-sm object-cover pointer-events-none">
                  <input type="text" x-model="slot.query"
                         @input="searchChamp(slot)"
                         @focus="onSlotFocus(slot)"
                         @blur="onSlotBlur(slot)"
                         :placeholder="ROLES[i] + '…'"
                         :class="slot.key ? 'pl-8' : 'pl-2.5'"
                         class="w-full bg-slate-800 border border-slate-700 rounded py-1 text-sm focus:outline-none focus:border-yellow-500">
                  <div x-show="slot.open"
                       class="absolute z-20 w-full mt-1 bg-slate-800 border border-slate-700 rounded max-h-40 overflow-y-auto shadow-xl">
                    <template x-for="c in slot.results" :key="c.id">
                      <button type="button"
                              class="w-full text-left flex items-center gap-2 px-2 py-1.5 text-sm hover:bg-slate-700 transition-colors"
                              @mousedown.prevent="pickChamp(slot, c)">
                        <img :src="$store.champions.imgUrl(c.key)"
                             class="w-6 h-6 rounded-sm object-cover flex-shrink-0">
                        <span x-text="c.name"></span>
                      </button>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Enemy champions -->
        <div>
          <label class="field-label mb-2 block">Campeões Inimigos</label>
          <div class="space-y-1.5">
            <template x-for="(slot, i) in enemyChamps" :key="i">
              <div class="flex items-center gap-2">
                <span class="text-xs text-slate-500 w-12 text-right" x-text="ROLES[i]"></span>
                <div class="relative flex-1">
                  <img x-show="slot.key"
                       :src="$store.champions.imgUrl(slot.key)"
                       class="absolute left-1.5 top-1/2 -translate-y-1/2 z-10 w-5 h-5 rounded-sm object-cover pointer-events-none">
                  <input type="text" x-model="slot.query"
                         @input="searchChamp(slot)"
                         @focus="onSlotFocus(slot)"
                         @blur="onSlotBlur(slot)"
                         :placeholder="ROLES[i] + '…'"
                         :class="slot.key ? 'pl-8' : 'pl-2.5'"
                         class="w-full bg-slate-800 border border-slate-700 rounded py-1 text-sm focus:outline-none focus:border-yellow-500">
                  <div x-show="slot.open"
                       class="absolute z-20 w-full mt-1 bg-slate-800 border border-slate-700 rounded max-h-40 overflow-y-auto shadow-xl">
                    <template x-for="c in slot.results" :key="c.id">
                      <button type="button"
                              class="w-full text-left flex items-center gap-2 px-2 py-1.5 text-sm hover:bg-slate-700 transition-colors"
                              @mousedown.prevent="pickChamp(slot, c)">
                        <img :src="$store.champions.imgUrl(c.key)"
                             class="w-6 h-6 rounded-sm object-cover flex-shrink-0">
                        <span x-text="c.name"></span>
                      </button>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

      </div>
    </section>

    <!-- ── Estratégia ─────────────────────────────────────────────────── -->
    <section class="bg-slate-900 border border-slate-800 rounded-lg p-5 mb-5">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Estratégia</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

        <div>
          <label class="field-label">Tipo de Comp (nossa)</label>
          <select x-model="compType" class="field-input">
            <option value="">— nenhum —</option>
            <option value="Protect">🔼 Protect</option>
            <option value="Pick">🔪 Pick</option>
            <option value="Split">🔀 Split</option>
            <option value="Siege">🌀 Siege</option>
            <option value="Engage">💥 Engage</option>
            <option value="Mix">⚠ Mix</option>
          </select>
        </div>

        <div>
          <label class="field-label">Tipo de Comp (inimiga)</label>
          <select x-model="enemyType" class="field-input">
            <option value="">— nenhum —</option>
            <option value="Protect">🔼 Protect</option>
            <option value="Pick">🔪 Pick</option>
            <option value="Split">🔀 Split</option>
            <option value="Siege">🌀 Siege</option>
            <option value="Engage">💥 Engage</option>
            <option value="Mix">⚠ Mix</option>
          </select>
        </div>

        <div>
          <label class="field-label mb-2 block">Subtipo de Comp</label>
          <div class="flex flex-wrap gap-x-4 gap-y-2">
            <template x-for="subtype in SUBTYPES" :key="subtype">
              <label class="flex items-center gap-1.5 cursor-pointer select-none">
                <input type="checkbox" x-model="compSubtype" :value="subtype"
                       class="rounded bg-slate-800 border-slate-600 accent-yellow-500">
                <span class="text-sm text-slate-300" x-text="subtype"></span>
              </label>
            </template>
          </div>
        </div>

        <div></div>

        <!-- Our scaling -->
        <div>
          <label class="field-label mb-2 block">
            Nosso Scaling <span class="text-slate-600 font-normal">(Early / Mid / Late)</span>
          </label>
          <div class="flex gap-4">
            <template x-for="(slot, si) in scaling" :key="si">
              <div>
                <div class="text-xs text-slate-500 mb-1 text-center" x-text="SCALE_SLOTS[si]"></div>
                <div class="flex gap-1">
                  <template x-for="(color, ci) in SCALE_COLORS" :key="ci">
                    <button type="button"
                            class="w-8 h-8 text-base rounded transition-colors hover:bg-slate-700"
                            :class="slot.ci === ci ? 'outline outline-2 outline-yellow-500' : ''"
                            @click="pickScaling(scaling, si, ci)"
                            x-text="color"></button>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Enemy scaling -->
        <div>
          <label class="field-label mb-2 block">Scaling Inimigo</label>
          <div class="flex gap-4">
            <template x-for="(slot, si) in enemyScaling" :key="si">
              <div>
                <div class="text-xs text-slate-500 mb-1 text-center" x-text="SCALE_SLOTS[si]"></div>
                <div class="flex gap-1">
                  <template x-for="(color, ci) in SCALE_COLORS" :key="ci">
                    <button type="button"
                            class="w-8 h-8 text-base rounded transition-colors hover:bg-slate-700"
                            :class="slot.ci === ci ? 'outline outline-2 outline-yellow-500' : ''"
                            @click="pickScaling(enemyScaling, si, ci)"
                            x-text="color"></button>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>

      </div>
    </section>

    <!-- ── Resultados ─────────────────────────────────────────────────── -->
    <section class="bg-slate-900 border border-slate-800 rounded-lg p-5 mb-5">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Resultados</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">

        <div>
          <label class="field-label">Duração (min)</label>
          <input type="number" x-model.number="duration" min="1" max="120" class="field-input" placeholder="32">
        </div>

        <div>
          <label class="field-label">MVP</label>
          <select x-model="mvp" class="field-input">
            <option value="">— nenhum —</option>
            <template x-for="p in PLAYERS" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </div>

        <!-- MVC champion autocomplete -->
        <div class="relative">
          <label class="field-label">MVC (Campeão)</label>
          <div class="relative mt-1">
            <img x-show="mvcKey"
                 :src="$store.champions.imgUrl(mvcKey)"
                 class="absolute left-2 top-1/2 -translate-y-1/2 z-10 w-6 h-6 rounded-sm object-cover pointer-events-none">
            <input type="text"
                   :value="mvcDisplay || mvcQuery"
                   @input="mvcQuery = $event.target.value; mvcDisplay = ''; mvcId = ''; mvcKey = ''; searchMvc()"
                   @focus="onMvcFocus()"
                   @blur="onMvcBlur()"
                   autocomplete="off"
                   :class="mvcKey ? 'pl-10' : 'pl-3'"
                   class="w-full bg-slate-800 border border-slate-700 rounded py-2 pr-3 text-sm focus:outline-none focus:border-yellow-500"
                   placeholder="Buscar…">
          </div>
          <div x-show="mvcOpen"
               class="absolute z-20 w-full mt-1 bg-slate-800 border border-slate-700 rounded max-h-48 overflow-y-auto shadow-xl">
            <template x-for="c in mvcResults" :key="c.id">
              <button type="button"
                      class="w-full text-left flex items-center gap-2 px-2 py-1.5 text-sm hover:bg-slate-700 transition-colors"
                      @mousedown.prevent="pickMvc(c)">
                <img :src="$store.champions.imgUrl(c.key)"
                     class="w-6 h-6 rounded-sm object-cover flex-shrink-0">
                <span x-text="c.name"></span>
              </button>
            </template>
            <div x-show="mvcResults.length === 0 && mvcQuery"
                 class="px-3 py-2 text-sm text-slate-500">Nenhum campeão encontrado</div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="field-label">Kills</label>
            <input type="number" x-model.number="teamKills" min="0" class="field-input" placeholder="0">
          </div>
          <div>
            <label class="field-label">Deaths</label>
            <input type="number" x-model.number="teamDeaths" min="0" class="field-input" placeholder="0">
          </div>
        </div>

      </div>
    </section>

    <!-- ── Estatísticas ───────────────────────────────────────────────── -->
    <section class="bg-slate-900 border border-slate-800 rounded-lg p-5">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">
        Estatísticas <span class="text-slate-600 font-normal normal-case">(opcional)</span>
      </h2>
      <div class="grid grid-cols-3 sm:grid-cols-5 gap-4">
        <div><label class="field-label">GD@10</label><input type="number" x-model.number="gd10" class="field-input" placeholder="0"></div>
        <div><label class="field-label">GD@20</label><input type="number" x-model.number="gd20" class="field-input" placeholder="0"></div>
        <div><label class="field-label">GD@F</label><input type="number" x-model.number="gdF" class="field-input" placeholder="0"></div>
        <div><label class="field-label">Ouro Total</label><input type="number" x-model.number="totalGold" class="field-input" placeholder="0"></div>
        <div><label class="field-label">Ouro/min</label><input type="number" x-model.number="goldPerMin" class="field-input" placeholder="0"></div>
        <div><label class="field-label">Dano</label><input type="number" x-model.number="damage" class="field-input" placeholder="0"></div>
        <div><label class="field-label">DA/DI</label><input type="number" x-model.number="dadi" step="0.01" class="field-input" placeholder="1.00"></div>
        <div><label class="field-label">Wards/min</label><input type="number" x-model.number="wardsPerMin" step="0.1" class="field-input" placeholder="0.0"></div>
        <div class="col-span-2"><label class="field-label">Fluxo de Objetivos</label><input type="text" x-model="objFlow" class="field-input" placeholder="t/v/g/d/b/i/n"></div>
      </div>
    </section>

  </main>

  <!-- Sticky action bar -->
  <div class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <button x-show="isEdit" @click="del()"
              class="text-red-500 hover:text-red-400 text-sm transition-colors"
              :disabled="deleting"
              x-text="deleting ? 'Excluindo…' : 'Excluir Partida'">
      </button>
      <div class="ml-auto flex gap-3">
        <a href="/index.html" class="px-4 py-2 text-sm text-slate-400 hover:text-slate-200 transition-colors">Cancelar</a>
        <button @click="save()" :disabled="saving"
                class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-semibold px-5 py-2 rounded text-sm transition-colors disabled:opacity-60"
                x-text="saving ? 'Salvando…' : 'Salvar'">
        </button>
      </div>
    </div>
  </div>

</body>
</html>
