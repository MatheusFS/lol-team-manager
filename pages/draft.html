<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente de Draft – LoL Team Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/scripts/shared.js"></script>
  <script src="/scripts/rank-derivation.js"></script>
  <script src="/scripts/player-metrics.js"></script>
  <script src="/scripts/champ-picker.js"></script>
  <script src="/scripts/comp-analysis.js"></script>
  <script src="/scripts/draft-role-resolver.js"></script>
  <script src="/scripts/draft-gap-analysis.js"></script>
  <script src="/scripts/draft-recommendations.js"></script>
  <script src="/scripts/draft-page.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body x-data="draftPage" @keydown.escape.window="closePicker()" class="bg-slate-950 text-slate-100 min-h-screen pb-16">
<script src="/scripts/layout.js"></script>

<main x-cloak class="max-w-7xl mx-auto px-4 py-6 space-y-5">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <div class="flex items-center justify-between gap-4 flex-wrap">
    <div class="flex items-center gap-4">
      <h1 class="text-xl font-bold text-slate-100">🗡️ Assistente de Draft</h1>
      <!-- Formation selector -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-slate-500">Formação:</label>
        <select x-model="selectedFormationId" @change="changeFormation(selectedFormationId)"
                class="bg-slate-800 border border-slate-700 rounded px-2.5 py-1 text-xs text-slate-200 focus:outline-none focus:border-yellow-500 cursor-pointer">
          <template x-for="f in formations" :key="f.id">
            <option :value="f.id" x-text="f.name"></option>
          </template>
        </select>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <!-- Our side toggle -->
      <div class="flex items-center gap-1.5 text-sm">
        <span class="text-slate-500 text-xs">Nosso lado:</span>
        <button @click="ourSide = 'blue'"
                class="px-3 py-1 rounded-lg text-xs font-semibold transition-colors"
                :class="ourSide === 'blue' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-slate-200'">
          🔵 Blue
        </button>
        <button @click="ourSide = 'red'"
                class="px-3 py-1 rounded-lg text-xs font-semibold transition-colors"
                :class="ourSide === 'red' ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-slate-200'">
          🔴 Red
        </button>
      </div>
      <button @click="exportDraft()" class="text-xs text-slate-400 hover:text-slate-200 border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5 transition-colors">
        ⬇ Exportar
      </button>
      <button @click="importDraft()" class="text-xs text-slate-400 hover:text-slate-200 border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5 transition-colors">
        ⬆ Importar
      </button>
      <button @click="reset()" class="text-xs text-slate-400 hover:text-slate-200 border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5 transition-colors">
        Limpar tudo
      </button>
    </div>
  </div>

  <!-- ── Step Indicator ─────────────────────────────────────────────────── -->
  <div class="bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 flex items-center justify-between gap-4 flex-wrap">
    <span class="text-sm font-medium"
          :class="currentPhase === 'done' ? 'text-green-400' : currentPhase.startsWith('ban') ? 'text-orange-400' : 'text-yellow-300'"
          x-text="stepLabel"></span>
    <div class="flex items-center gap-1 text-[10px]">
      <template x-for="(phase, i) in ['Fase 1 Bans','Fase 1 Picks','Fase 2 Bans','Fase 2 Picks']" :key="i">
        <span class="px-2 py-0.5 rounded-full border transition-colors"
              :class="{
                'bg-yellow-500/20 border-yellow-500/50 text-yellow-300': currentStep >= [0,6,12,16][i] && currentStep < [6,12,16,20][i],
                'bg-green-500/15 border-green-500/30 text-green-400':   currentStep >= [6,12,16,20][i],
                'bg-slate-800 border-slate-700 text-slate-500':          currentStep < [0,6,12,16][i],
              }"
              x-text="phase"></span>
      </template>
    </div>
  </div>

  <!-- ── Draft Board ────────────────────────────────────────────────────── -->
  <div class="grid grid-cols-2 gap-3">

    <!-- Blue Side -->
    <div class="space-y-2">
      <div class="flex items-center justify-between">
        <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-1.5">
          🔵 Blue Side
          <span x-show="ourSide === 'blue'" class="text-yellow-400 font-normal normal-case tracking-normal">(nós)</span>
        </h2>
        <!-- Blue bans row -->
        <div class="flex gap-1">
          <template x-for="(ban, i) in blueBans" :key="i">
            <div @click="openPicker('ban', 'blue', i)"
                 class="w-8 h-8 rounded border cursor-pointer transition-all overflow-hidden relative"
                 :class="ban
                   ? 'border-orange-700 bg-slate-800'
                   : isCurrentStep('ban','blue',i)
                     ? 'border-yellow-400 animate-pulse bg-slate-900/60'
                     : 'border-dashed border-slate-700 bg-slate-900/30 hover:border-orange-700/50'">
              <img x-show="ban" :src="$store.champions.imgUrl(ban?.key)"
                   class="w-full h-full object-cover opacity-50 grayscale">
              <div x-show="ban" class="absolute inset-0 flex items-center justify-center text-[10px] text-orange-400 font-bold">✕</div>
            </div>
          </template>
        </div>
      </div>

      <!-- Blue picks (B1-B5) -->
      <template x-for="(champ, i) in bluePicks" :key="i">
        <div @click="openPicker('pick', 'blue', i)"
             class="rounded-lg border-2 transition-all cursor-pointer min-h-14 flex items-center gap-2.5 px-3 py-2"
             :class="champ
               ? 'border-blue-800 bg-slate-900 hover:border-blue-600'
               : isCurrentStep('pick','blue',i)
                 ? 'border-yellow-400 animate-pulse bg-slate-900/60 hover:border-yellow-300'
                 : 'border-dashed border-slate-700 bg-slate-900/40 hover:border-blue-700'">
          <!-- Pick order label -->
          <span class="text-[10px] font-bold w-6 shrink-0 text-center"
                :class="champ ? 'text-blue-500' : 'text-slate-600'"
                x-text="'B' + (i+1)"></span>

          <template x-if="!champ">
            <div class="flex items-center gap-2 text-slate-600 select-none">
              <span class="text-base">+</span>
              <span class="text-xs">Escolher campeão…</span>
            </div>
          </template>

          <template x-if="champ">
            <div class="flex items-center gap-2.5 w-full min-w-0">
              <!-- Ícone -->
              <img :src="$store.champions.imgUrl(champ.key)" class="w-9 h-9 rounded border border-slate-700 shrink-0">
              <!-- Info principal -->
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-slate-100 truncate" x-text="champ.name"></div>
                <div class="flex items-center gap-1 mt-0.5">
                  <span class="text-[10px] px-1 rounded bg-slate-800 text-slate-400" x-text="champ.class || '—'"></span>
                  <span x-show="champ.damage_type" class="text-[10px] px-1 rounded font-semibold" :class="damageClass(champ.damage_type)" x-text="damageLabel(champ.damage_type)"></span>
                </div>
              </div>
              <!-- Roles -->
              <div class="flex-1">
                  <template x-for="role in parseViableRoles(champ)" :key="role">
                    <template x-if="ourSide === 'blue'">
                      <button @click.stop="setPickRole('blue', i, role)"
                              class="text-[10px] px-0.5 mx-0.5 rounded uppercase font-medium transition-colors"
                              :class="pickRoles['blue:' + i] === role
                                ? 'bg-blue-700 text-white'
                                : 'bg-slate-700/80 text-slate-400 hover:bg-slate-600 hover:text-slate-200'"
                              x-text="role === 'jng' ? 'JNG' : role.slice(0,3).toUpperCase()"></button>
                    </template>
                    <template x-if="ourSide !== 'blue'">
                      <span class="text-[9px] px-0.5 rounded bg-slate-700/80 text-slate-400 uppercase font-medium" x-text="role === 'jng' ? 'JNG' : role.slice(0,3).toUpperCase()"></span>
                    </template>
                  </template>
              </div>
              <!-- Comp -->
              <div class="flex flex-col gap-0.5 w-20 shrink-0">
                <span x-show="champ.comp_type" class="text-[10px] text-slate-300 truncate">
                  <span x-text="compEmoji(champ.comp_type)"></span>
                  <span x-text="' ' + (champ.comp_type || '')"></span>
                </span>
                <span x-show="champ.comp_type_2" class="text-[10px] text-slate-500 truncate">
                  <span x-text="compEmoji(champ.comp_type_2)"></span>
                  <span x-text="' ' + (champ.comp_type_2 || '')"></span>
                </span>
              </div>
               <!-- EML -->
              <div class="flex flex-col items-center gap-0.5 shrink-0">
                <div class="flex items-end gap-x-0.5 gap-y-1 mb-1">
                  <template x-for="[phase, label] in [['early','E'],['mid','M'],['late','L']]" :key="phase">
                    <div class="flex flex-col items-center gap-px">
                      <span class="text-[7px] font-bold text-slate-600" x-text="label"></span>
                      <span class="w-2 h-2"
                            :class="scaleIdx(champ[phase]) === 2 ? 'bg-green-500' : scaleIdx(champ[phase]) === 1 ? 'bg-yellow-400' : 'bg-red-500'"></span>
                    </div>
                  </template>
                </div>
              </div>
              <button @click.stop="clearSlot('pick','blue',i)" class="text-slate-600 hover:text-red-400 text-base leading-none shrink-0 transition-colors ml-0.5">×</button>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- Red Side -->
    <div class="space-y-2">
      <div class="flex items-center justify-between">
        <!-- Red bans row (left-aligned, reversed visually) -->
        <div class="flex gap-1">
          <template x-for="(ban, i) in redBans" :key="i">
            <div @click="openPicker('ban', 'red', i)"
                 class="w-8 h-8 rounded border cursor-pointer transition-all overflow-hidden relative"
                 :class="ban
                   ? 'border-orange-700 bg-slate-800'
                   : isCurrentStep('ban','red',i)
                     ? 'border-yellow-400 animate-pulse bg-slate-900/60'
                     : 'border-dashed border-slate-700 bg-slate-900/30 hover:border-orange-700/50'">
              <img x-show="ban" :src="$store.champions.imgUrl(ban?.key)"
                   class="w-full h-full object-cover opacity-50 grayscale">
              <div x-show="ban" class="absolute inset-0 flex items-center justify-center text-[10px] text-orange-400 font-bold">✕</div>
            </div>
          </template>
        </div>
        <h2 class="text-xs font-bold text-red-400 uppercase tracking-wider flex items-center gap-1.5">
          <span x-show="ourSide === 'red'" class="text-yellow-400 font-normal normal-case tracking-normal">(nós)</span>
          Red Side 🔴
        </h2>
      </div>

      <!-- Red picks (R1-R5) -->
      <template x-for="(champ, i) in redPicks" :key="i">
        <div @click="openPicker('pick', 'red', i)"
             class="rounded-lg border-2 transition-all cursor-pointer min-h-14 flex items-center gap-2.5 px-3 py-2"
             :class="champ
               ? 'border-red-900 bg-slate-900 hover:border-red-700'
               : isCurrentStep('pick','red',i)
                 ? 'border-yellow-400 animate-pulse bg-slate-900/60 hover:border-yellow-300'
                 : 'border-dashed border-slate-700 bg-slate-900/40 hover:border-red-800'">
          <template x-if="!champ">
            <div class="flex items-center gap-2 text-slate-600 select-none w-full justify-end">
              <span class="text-xs">Escolher campeão…</span>
              <span class="text-base">+</span>
            </div>
          </template>

          <template x-if="champ">
            <div class="flex items-center gap-2.5 w-full min-w-0">
              <button @click.stop="clearSlot('pick','red',i)" class="text-slate-600 hover:text-red-400 text-base leading-none shrink-0 transition-colors mr-0.5">×</button>
              <!-- EML -->
              <div class="flex flex-col items-center gap-0.5 shrink-0">
                <div class="flex items-end gap-x-0.5 gap-y-1 mb-1">
                  <template x-for="[phase, label] in [['early','E'],['mid','M'],['late','L']]" :key="phase">
                    <div class="flex flex-col items-center">
                      <span class="text-[7px] font-bold text-slate-600" x-text="label"></span>
                      <span class="w-2 h-2"
                            :class="scaleIdx(champ[phase]) === 2 ? 'bg-green-500' : scaleIdx(champ[phase]) === 1 ? 'bg-yellow-400' : 'bg-red-500'"></span>
                    </div>
                  </template>
                </div>
              </div>
              <!-- Comp -->
              <div class="flex flex-col gap-0.5 w-20 shrink-0 text-right">
                <span x-show="champ.comp_type" class="text-[10px] text-slate-300 truncate">
                  <span x-text="(champ.comp_type || '') + ' '"></span>
                  <span x-text="compEmoji(champ.comp_type)"></span>
                </span>
                <span x-show="champ.comp_type_2" class="text-[10px] text-slate-500 truncate">
                  <span x-text="(champ.comp_type_2 || '') + ' '"></span>
                  <span x-text="compEmoji(champ.comp_type_2)"></span>
                </span>
              </div>
              <!-- Roles -->
              <div class="flex-1">
                  <template x-for="role in parseViableRoles(champ)" :key="role">
                    <template x-if="ourSide === 'red'">
                      <button @click.stop="setPickRole('red', i, role)"
                              class="text-[10px] px-0.5 mx-0.5 rounded uppercase font-medium transition-colors"
                              :class="pickRoles['red:' + i] === role
                                ? 'bg-red-700 text-white'
                                : 'bg-slate-700/80 text-slate-400 hover:bg-slate-600 hover:text-slate-200'"
                              x-text="role === 'jng' ? 'JNG' : role.slice(0,3).toUpperCase()"></button>
                    </template>
                    <template x-if="ourSide !== 'red'">
                      <span class="text-[9px] px-0.5 rounded bg-slate-700/80 text-slate-400 uppercase font-medium" x-text="role === 'jng' ? 'JNG' : role.slice(0,3).toUpperCase()"></span>
                    </template>
                  </template>
              </div>
              <!-- Info principal -->
              <div class="flex-1 min-w-0 text-right">
                <div class="text-sm font-medium text-slate-100 truncate" x-text="champ.name"></div>
                <div class="flex items-center gap-1 mt-0.5 justify-end">
                  <span x-show="champ.damage_type" class="text-[10px] px-1 rounded font-semibold" :class="damageClass(champ.damage_type)" x-text="damageLabel(champ.damage_type)"></span>
                  <span class="text-[10px] px-1 rounded bg-slate-800 text-slate-400" x-text="champ.class || '—'"></span>
                </div>
              </div>
              <!-- Ícone -->
              <img :src="$store.champions.imgUrl(champ.key)" class="w-9 h-9 rounded border border-slate-700 shrink-0">
            </div>
          </template>

          <!-- Pick order label (right-aligned) -->
          <span class="text-[10px] font-bold w-6 shrink-0 text-center"
                :class="champ ? 'text-red-600' : 'text-slate-600'"
                x-text="'R' + (i+1)"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- ── Comp Matchup Banner ─────────────────────────────────────────────── -->
  <template x-if="ourAnalysis.count >= 3 || enemyAnalysis.count >= 3">
    <div class="rounded-xl border px-4 py-3 flex items-center justify-between gap-4 flex-wrap"
         :class="{
           'bg-green-500/10 border-green-500/30': matchup === 'advantage',
           'bg-red-500/10 border-red-500/30':     matchup === 'disadvantage',
           'bg-slate-900 border-slate-800':        matchup === 'neutral' || matchup === null,
         }">
      <div class="flex items-center gap-3 flex-wrap">
        <!-- Comp type badges -->
        <template x-if="ourAnalysis.compType">
          <span class="text-sm font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-200">
            <span x-text="compEmoji(ourAnalysis.compType)"></span>
            <span x-text="ourAnalysis.compType"></span>
          </span>
        </template>
        <!-- Matchup verdict -->
        <template x-if="matchup === 'advantage'">
          <span class="text-green-400 text-sm font-semibold">
            ✅ <span x-text="ourAnalysis.compType"></span> tem vantagem sobre
            <span x-text="enemyAnalysis.compType" class="font-bold"></span>
          </span>
        </template>
        <template x-if="matchup === 'disadvantage'">
          <span class="text-red-400 text-sm font-semibold">
            ⚠️ <span x-text="enemyAnalysis.compType"></span> countera
            <span x-text="ourAnalysis.compType" class="font-bold"></span>
          </span>
        </template>
        <template x-if="matchup === 'neutral'">
          <span class="text-slate-400 text-sm">
            ↔ <span x-text="ourAnalysis.compType"></span> vs <span x-text="enemyAnalysis.compType"></span> — sem counter direto
          </span>
        </template>
        <template x-if="!matchup && (ourAnalysis.compType || enemyAnalysis.compType)">
          <span class="text-slate-500 text-sm">Aguardando mais picks para definir comp…</span>
        </template>
        <template x-if="!ourAnalysis.compType && !enemyAnalysis.compType">
          <span class="text-slate-600 text-sm">Adicione picks para ver análise de comp</span>
        </template>
      </div>
      <!-- Side advantage -->
      <div class="text-[11px] text-slate-500 shrink-0">
        <span x-show="ourSide === 'blue'">🔵 First pick: tema fechado antes</span>
        <span x-show="ourSide === 'red'">🔴 Last pick (R5): counter garantido</span>
      </div>
    </div>
  </template>

  <!-- ── Analysis Panels ────────────────────────────────────────────────── -->
  <template x-if="blueAnalysis.count > 0 || redAnalysis.count > 0">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <!-- Blue Team (left, always blue) -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h3 class="text-sm font-semibold" :class="ourSide === 'blue' ? 'text-blue-400' : 'text-slate-400'">
            <span x-show="ourSide === 'blue'">Nosso Time</span>
            <span x-show="ourSide !== 'blue'">Time Inimigo</span>
          </h3>
          <div class="flex items-center gap-1 mb-2">
            <span class="text-xs text-slate-500">Curva EML:</span>
            <template x-for="(raw, pi) in blueAnalysis.scaling" :key="pi">
              <div class="flex items-center gap-0.5">
                <!-- <span class="text-[10px] text-slate-600" x-text="['E','M','L'][pi]"></span> -->
                <span x-text="raw != null ? SCALE_COLORS[scaleIdx(raw)] : '⬜'"></span>
              </div>
            </template>
          </div>
          <template x-if="blueAnalysis.compType">
            <span class="text-xs px-2 py-0.5 rounded-full bg-slate-800 text-slate-200">
              <span x-text="compEmoji(blueAnalysis.compType)"></span>
              <span x-text="blueAnalysis.compType"></span>
            </span>
          </template>
        </div>
        <template x-if="blueAnalysis.count > 0">
          <div>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-1.5">
              <template x-for="[key, h] in Object.entries(blueAnalysis.heuristics)" :key="key">
                <div class="rounded-lg px-2 py-2 text-center text-xs" :class="badgeClass(h.color)">
                  <div class="font-semibold" x-text="h.label"></div>
                  <div class="flex justify-center gap-0.5 mt-1">
                    <template x-for="dot in [1,2,3]" :key="dot">
                      <span class="w-1.5 h-1.5 rounded-full" :class="dot <= h.score ? 'bg-current' : 'bg-current opacity-20'"></span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
        <template x-if="blueAnalysis.count === 0">
          <p class="text-xs text-slate-600 text-center py-3">Adicione picks para ver a análise</p>
        </template>
      </div>

      <!-- Red Team (right, always red) -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h3 class="text-sm font-semibold" :class="ourSide === 'red' ? 'text-red-400' : 'text-slate-400'">
            <span x-show="ourSide === 'red'">Nosso Time</span>
            <span x-show="ourSide !== 'red'">Time Inimigo</span>
          </h3>
          <div class="flex items-center gap-1 mb-2">
            <span class="text-xs text-slate-500">Curva EML:</span>
            <template x-for="(raw, pi) in redAnalysis.scaling" :key="pi">
              <div class="flex items-center gap-0.5">
                <!-- <span class="text-[10px] text-slate-600" x-text="['E','M','L'][pi]"></span> -->
                <span x-text="raw != null ? SCALE_COLORS[scaleIdx(raw)] : '⬜'"></span>
              </div>
            </template>
          </div>
          <template x-if="redAnalysis.compType">
            <span class="text-xs px-2 py-0.5 rounded-full bg-slate-800 text-slate-200">
              <span x-text="compEmoji(redAnalysis.compType)"></span>
              <span x-text="redAnalysis.compType"></span>
            </span>
          </template>
        </div>
        <template x-if="redAnalysis.count > 0">
          <div>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-1.5">
              <template x-for="[key, h] in Object.entries(redAnalysis.heuristics)" :key="key">
                <div class="rounded-lg px-2 py-2 text-center text-xs" :class="badgeClass(h.color)">
                  <div class="font-semibold" x-text="h.label"></div>
                  <div class="flex justify-center gap-0.5 mt-1">
                    <template x-for="dot in [1,2,3]" :key="dot">
                      <span class="w-1.5 h-1.5 rounded-full" :class="dot <= h.score ? 'bg-current' : 'bg-current opacity-20'"></span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
        <template x-if="redAnalysis.count === 0">
          <p class="text-xs text-slate-600 text-center py-3">Adicione picks para ver a análise</p>
        </template>
      </div>
    </div>
  </template>

  <!-- ── Comparison Bars ────────────────────────────────────────────────── -->
  <template x-if="blueAnalysis.count >= 3 && redAnalysis.count >= 3">
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-2.5">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Comparação</h3>
      <div class="grid grid-cols-[1fr_auto_1fr] gap-2 items-center text-[10px] mb-1">
        <span :class="ourSide === 'blue' ? 'text-blue-400' : 'text-slate-400'" class="font-semibold">🔵 Blue</span>
        <span class="text-slate-600 text-center w-24">Métrica</span>
        <span :class="ourSide === 'red' ? 'text-red-400' : 'text-slate-400'" class="font-semibold text-right">🔴 Red</span>
      </div>
      <template x-for="[key, blueH] in Object.entries(blueAnalysis.heuristics)" :key="key">
        <div class="grid grid-cols-[1fr_auto_1fr] gap-2 items-center">
          <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-300"
                 :style="`width: ${(blueH.score/3)*100}%`"
                 :class="blueH.score >= 3 ? 'bg-blue-400' : blueH.score >= 2 ? 'bg-blue-600' : 'bg-blue-900'"></div>
          </div>
          <span class="text-[10px] text-slate-500 w-24 text-center" x-text="blueH.label"></span>
          <div class="h-2 bg-slate-800 rounded-full overflow-hidden flex justify-end">
            <div class="h-full rounded-full transition-all duration-300"
                 :style="`width: ${(redAnalysis.heuristics[key].score/3)*100}%`"
                 :class="redAnalysis.heuristics[key].score >= 3 ? 'bg-red-400' : redAnalysis.heuristics[key].score >= 2 ? 'bg-red-600' : 'bg-red-900'"></div>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- ── Recommendations ────────────────────────────────────────────────── -->
  <template x-if="ourRecs.length > 0">
    <div class="space-y-3">
      <div class="flex flex-wrap items-center gap-2">
        <h3 class="text-sm font-semibold text-amber-400">💡 Recomendações para próximos picks</h3>
        <div class="flex gap-1 flex-wrap">
          <template x-for="rec in ourRecs" :key="rec.role">
            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-800 border border-slate-600 text-slate-300 uppercase"
                  x-text="roleLabel(rec.role)"></span>
          </template>
        </div>
      </div>
       <template x-for="(rec, ri) in ourRecs" :key="ri">
          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
             <div class="w-full mb-3">
               <!-- Role label + player name (full width, centered) -->
               <span class="text-xs font-bold px-2.5 py-1 rounded bg-slate-800 border border-slate-700 text-slate-100 w-full text-center block"
                     x-text="roleLabel(rec.role) + (rec.player ? ' (' + rec.player + ')' : '')"></span>
              </div>
              <div class="flex flex-row flex-wrap gap-4">
                 <!-- Dynamic Strategic Columns (layout computed per-role in ourRecs getter) -->
                 <template x-for="(col, ci) in rec.columns" :key="ci">
                   <div class="flex flex-col gap-2" :style="`flex: ${col.units} 1 0; min-width: 0;`">
                    <!-- Column header: 2-part structure -->
                    <div class="flex flex-col gap-1 px-2 py-1 rounded border" :class="col.colorClasses.header">
                      <!-- Row 1: prefix (emoji+type) + gap names -->
                      <div class="flex flex-wrap items-center gap-1">
                        <span class="text-[11px] font-bold" x-text="col.prefix"></span>
                        <span class="text-[10px] text-slate-300" x-text="col.gapNames"></span>
                      </div>
                       <!-- Row 2: class tags (cross-product badges) - only if not empty -->
                       <template x-if="col.classTags && (Array.isArray(col.classTags) ? col.classTags.length > 0 : col.classTags.display)">
                         <div class="flex flex-wrap gap-1">
                           <template x-if="Array.isArray(col.classTags)">
                             <template x-for="tag in col.classTags" :key="tag">
                               <span class="text-[9px] px-1 py-0.5 rounded bg-slate-800 border border-slate-600 text-slate-400" x-text="tag"></span>
                             </template>
                           </template>
                           <template x-if="!Array.isArray(col.classTags) && col.classTags.display">
                             <span class="text-[9px] px-1 py-0.5 rounded bg-slate-800 border border-slate-600 text-slate-400" 
                                   :title="col.classTags.tooltip" 
                                   x-text="col.classTags.display"></span>
                           </template>
                         </div>
                       </template>
                    </div>
                     <!-- Champions in this column (each champion occupies 1/5 of width with gap spacing) -->
                     <div class="flex flex-row w-full gap-1">
                      <template x-for="c in col.candidates" :key="c.id">
                        <button @click="quickPick(c)"
                                :disabled="ourPicks.every(Boolean)"
                                class="relative aspect-square rounded-lg border-2 p-3 bg-slate-950 transition-colors group disabled:opacity-40 disabled:cursor-not-allowed flex-1 max-w-[25%]"
                                :class="[champBorderColor(c, rec.player), col.colorClasses.button]">
                           <!-- Inner image container: inset within padding -->
                           <div class="relative w-full h-full">
                             <!-- Image with overflow clipping -->
                             <div class="absolute inset-0 rounded-md overflow-hidden">
                               <img :src="$store.champions.imgUrl(c.key)" class="w-full h-full object-cover">
                               
                               <!-- Dark gradient overlay for text readability -->
                               <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
                             </div>
                           </div>
                           
                             <!-- Cache card data to avoid repeated function calls -->
                               <div x-data="{
                                 get card() {
                                   return champCardData(c, rec.player, rec.role)
                                 }
                               }" class="contents">
                                 <!-- Top-left: RI (Identity Rank icon) -->
                                 <template x-if="card.identity && !card.isLoading">
                                   <div class="absolute top-0.5 left-0.5 z-10">
                                     <img :src="card.identity.imgUrl" class="w-5 h-5">
                                   </div>
                                 </template>
                                 <!-- Skeleton placeholder for IR while loading -->
                                 <template x-if="!card.identity && card.isLoading">
                                   <div class="absolute top-0.5 left-0.5 z-10 w-5 h-5 bg-slate-600 rounded animate-pulse"></div>
                                 </template>
                                
                                <!-- Top-center: C1+C2 (comp type emojis) -->
                                <template x-if="c.comp_type || c.comp_type_2">
                                  <div class="absolute top-0.5 left-1/2 -translate-x-1/2 flex items-center gap-px z-10">
                                    <template x-if="c.comp_type">
                                      <span class="text-[10px] leading-none drop-shadow-sm" x-text="compEmoji(c.comp_type)"></span>
                                    </template>
                                    <template x-if="c.comp_type_2">
                                      <span class="text-[10px] leading-none drop-shadow-sm opacity-50" x-text="compEmoji(c.comp_type_2)"></span>
                                    </template>
                                  </div>
                                </template>
                                
                                  <!-- Top-right: WR (Win Rate %) -->
                                  <template x-if="card.wr && !card.isLoading">
                                    <div class="absolute top-0.5 right-0.5 text-[12px] font-bold leading-none z-10 drop-shadow-sm">
                                     <span :class="wrColor(card.wr.pct)" x-text="card.wr.pct + '%'"></span>
                                   </div>
                                 </template>
                                 <!-- Fallback "—" when loading failed -->
                                 <template x-if="!card.wr && !card.isLoading">
                                   <div class="absolute top-0.5 right-0.5 text-[12px] font-bold leading-none z-10 drop-shadow-sm">
                                     <span class="text-slate-500">—</span>
                                   </div>
                                 </template>
                                 <!-- Skeleton placeholder for WR while loading -->
                                 <template x-if="card.isLoading">
                                   <div class="absolute top-0.5 right-0.5 z-10 w-6 h-4 bg-slate-600 rounded animate-pulse"></div>
                                 </template>
                                
                                  <!-- Bottom-left: P (Pool tier) -->
                                  <template x-if="card.poolTier && !card.isLoading">
                                    <div class="absolute bottom-0.5 left-0.5 text-[18px] leading-none z-10 drop-shadow-sm">
                                     <span :class="{
                                       'text-yellow-300': card.poolTier === 'star',
                                       'text-green-400':  card.poolTier === 'green',
                                       'text-yellow-600': card.poolTier === 'yellow',
                                     }" x-text="poolTierIcon(card.poolTier)"></span>
                                   </div>
                                 </template>
                                 <!-- Fallback "—" when loading failed -->
                                 <template x-if="!card.poolTier && !card.isLoading">
                                   <div class="absolute bottom-0.5 left-0.5 text-[18px] leading-none z-10 drop-shadow-sm">
                                     <span class="text-slate-500">—</span>
                                   </div>
                                 </template>
                                 <!-- Skeleton placeholder for PT while loading -->
                                 <template x-if="card.isLoading">
                                   <div class="absolute bottom-0.5 left-0.5 z-10 w-5 h-5 bg-slate-600 rounded animate-pulse"></div>
                                 </template>
                                
                                <!-- Bottom-center: EML (Scaling curve) -->
                                 <div class="absolute bottom-0.5 left-1/2 -translate-x-1/2 flex items-center gap-px z-10">
                                   <template x-for="(idx, i) in card.scaling" :key="i">
                                     <span class="w-2 h-2 inline-block"
                                           :class="idx == null ? 'bg-slate-600' : idx === 2 ? 'bg-green-500' : idx === 1 ? 'bg-yellow-400' : 'bg-red-500'"></span>
                                   </template>
                                 </div>
                                
                                 <!-- Bottom-right: M (Meta tier) -->
                                 <template x-if="card.metaTier !== '?'">
                                   <div class="absolute bottom-0.5 right-0.5 text-[14px] font-bold leading-none z-10 drop-shadow-sm">
                                    <span :class="tierColor(card.metaTier)" x-text="card.metaTier"></span>
                                  </div>
                                </template>
                              </div>
                         </button>
                       </template>
                    </div>
                 </div>
               </template>
             </div>
         </div>
       </template>
    </div>
  </template>

</main>

<!-- ── Champion Picker Modal ──────────────────────────────────────────────── -->
<template x-if="activeSlot !== null">
  <div class="fixed inset-0 z-50 flex items-start justify-center pt-12 p-4"
       @click.self="closePicker()">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="relative bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-md">
      <!-- Header -->
      <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <span class="text-sm font-semibold"
                :class="activeSlot?.side === 'blue' ? 'text-blue-400' : 'text-red-400'"
                x-text="activeSlot?.side === 'blue' ? '🔵 Blue' : '🔴 Red'"></span>
          <span class="text-sm text-slate-500"
                x-text="activeSlot?.type === 'ban' ? '— Selecionar Ban' : '— Selecionar Pick'"></span>
        </div>
        <button @click="closePicker()" class="text-slate-500 hover:text-slate-200 text-xl leading-none">×</button>
      </div>
      <!-- Search -->
      <div class="p-3 border-b border-slate-800">
        <input id="modal-search"
               type="text"
               x-model="modalQuery"
               @input="searchModal()"
               placeholder="Buscar campeão…"
               autocomplete="off"
               class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 text-slate-100 placeholder-slate-500">
      </div>
      <!-- Results -->
      <div class="max-h-72 overflow-y-auto p-3">
        <template x-if="!modalQuery.trim()">
          <p class="text-center text-slate-600 text-sm py-8">Digite para buscar…</p>
        </template>
        <template x-if="modalQuery.trim() && modalResults.length === 0">
          <p class="text-center text-slate-600 text-sm py-8">Nenhum resultado</p>
        </template>
        <div class="grid grid-cols-5 sm:grid-cols-6 gap-2">
          <template x-for="c in modalResults" :key="c.id">
            <button @click="pickChamp(c)"
                    class="flex flex-col items-center gap-1 p-1.5 rounded-lg hover:bg-slate-800 transition-colors group">
              <div class="w-11 h-11 rounded-lg overflow-hidden border border-slate-700 group-hover:border-yellow-500 transition-colors">
                <img :src="$store.champions.imgUrl(c.key)" class="w-full h-full object-cover">
              </div>
              <span class="text-[10px] text-slate-400 group-hover:text-slate-200 truncate w-full text-center" x-text="c.name"></span>
              <span class="text-[9px] font-bold" :class="tierColor(bestTierOf(c))" x-text="bestTierOf(c) ?? ''"></span>
            </button>
          </template>
        </div>
      </div>
    </div>
  </div>
</template>

</body>
</html>
