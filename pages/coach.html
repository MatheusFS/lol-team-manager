<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach – LoL Team Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/scripts/shared.js"></script>
  <script src="/scripts/rank-derivation.js"></script>
  <script src="/scripts/player-metrics.js"></script>
  <script src="/scripts/coach-page.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="coachPage" class="bg-slate-950 text-slate-100 min-h-screen">
<script src="/scripts/layout.js"></script>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- Loading state -->
    <div x-show="loading" class="flex items-center justify-center py-12">
      <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-yellow-500 mb-3"></div>
        <p class="text-slate-400">Carregando dados...</p>
      </div>
    </div>

    <!-- Error state -->
    <div x-show="error" class="bg-red-500/10 border border-red-500/30 rounded-lg p-4 mb-5">
      <p class="text-red-400" x-text="error"></p>
    </div>

    <!-- Main content -->
    <template x-if="!loading && !error && players.length > 0">
      <div>
        <!-- Header: 2x2 Grid Layout -->
        <div class="mb-6 grid grid-cols-2 gap-6">
          <!-- Row 1, Col 1: Title -->
          <div>
            <h1 class="text-3xl font-bold">🎓 Coach</h1>
          </div>
          
          <!-- Row 1, Col 2: Player Selector -->
          <div>
            <label class="text-xs text-slate-400 block mb-2">Jogador:</label>
            
            <!-- Desktop: Button group (hidden on mobile) -->
            <div class="hidden md:flex gap-1 flex-wrap">
              <template x-for="p in players" :key="p.id">
                <button
                  @click="selectedPlayerId = p.id"
                  :class="`px-3 py-2 text-xs rounded border transition ${selectedPlayerId === p.id ? 'bg-yellow-500 text-slate-900 border-yellow-500 font-medium' : 'border-slate-700 text-slate-400 hover:text-slate-300'}`"
                  x-text="p.name">
                </button>
              </template>
            </div>
            
            <!-- Mobile: Dropdown (hidden on desktop) -->
            <select x-model="selectedPlayerId" class="md:hidden w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-sm text-slate-100 cursor-pointer hover:border-slate-600">
              <template x-for="p in players" :key="p.id">
                <option :value="p.id" x-text="p.name"></option>
              </template>
            </select>
          </div>
          
          <!-- Row 2, Col 1: Description -->
          <div>
            <p class="text-slate-400 text-sm">
              Análise automática de pontos fortes e fracos baseada em dados de todas as partidas com Riot API.
            </p>
          </div>
          
          <!-- Row 2, Col 2: Identity Selector -->
          <div>
            <label class="text-xs text-slate-400 block mb-2">Identidade:</label>
            
            <!-- Desktop: Button group (hidden on mobile) -->
            <div class="hidden md:flex gap-1 flex-wrap">
              <template x-for="l in lenses" :key="l.key">
                <button
                  @click="lens = l.key"
                  :disabled="getIdentityGameCount(l.key) < 1"
                  :class="`px-3 py-2 text-xs rounded border transition ${lens === l.key ? 'bg-yellow-500 text-slate-900 border-yellow-500 font-medium' : 'border-slate-700 text-slate-400 hover:text-slate-300'} ${getIdentityGameCount(l.key) < 1 ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`"
                  x-text="l.label">
                </button>
              </template>
            </div>
            
            <!-- Mobile: Dropdown (hidden on desktop) -->
            <select x-model="lens" class="md:hidden w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-sm text-slate-100 cursor-pointer hover:border-slate-600 disabled:opacity-50 disabled:cursor-not-allowed">
              <template x-for="l in lenses" :key="l.key">
                <option :value="l.key" :disabled="getIdentityGameCount(l.key) < 1" x-text="l.label"></option>
              </template>
            </select>
          </div>
        </div>

        <!-- Full-width Analysis Text -->
        <p class="text-slate-400 text-sm mb-6">
          Análise automática de pontos fortes e fracos baseada em dados de todas as partidas com Riot API.
        </p>

        <!-- Overview Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <template x-for="card in overviewCards" :key="card.label">
            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-2" x-text="card.label"></div>
              <div class="flex items-center gap-3 mb-1">
                <div :class="`text-2xl font-bold ${card.color}`" x-text="card.value"></div>
                <template x-if="card.imgUrl">
                  <img :src="card.imgUrl" class="w-8 h-8" :alt="card.label">
                </template>
              </div>
              <div class="text-xs text-slate-500" x-text="card.sub"></div>
            </div>
          </template>

          <!-- Identidade Dominante Card (Geral lens only) -->
          <template x-if="lens === 'geral' && bestIdentity">
            <div class="bg-slate-900 border border-purple-700/50 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-2">Identidade Dominante</div>
              <div class="flex items-center gap-2">
                <div class="text-2xl font-bold text-purple-400" x-text="bestIdentity.label"></div>
                <img :src="bestIdentity.identRank.imgUrl" class="w-6 h-6" :title="bestIdentity.identRank.label">
              </div>
            </div>
          </template>
        </div>

        <!-- Achievements Section -->
        <template x-if="achievements.length > 0">
          <div class="mb-8">
            <h2 class="text-lg font-bold text-yellow-400 mb-4">🏆 Conquistas</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
              <template x-for="achievement in achievements" :key="achievement.metric">
                <div class="bg-yellow-500/5 border border-yellow-500/40 rounded-lg p-4 text-center">
                  <div class="text-sm font-bold text-yellow-300 mb-2" x-text="achievement.label"></div>
                  <div class="text-xs text-slate-400 mb-3" x-text="`1º de ${achievement.teamSize}`"></div>
                  <div class="flex items-center justify-center gap-2 mb-2">
                    <template x-if="achievement.rankImgUrl">
                      <img :src="achievement.rankImgUrl" class="w-4 h-4" :title="achievement.rankLabel">
                    </template>
                    <span class="text-xs font-semibold text-yellow-300" x-text="achievement.rankLabel"></span>
                  </div>
                  <div class="text-sm font-bold text-yellow-200" x-text="achievement.formatted"></div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- No data message -->
        <template x-if="playerMetrics && playerMetrics.n < 1">
          <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 text-center">
            <p class="text-slate-400">
              Nenhuma partida com dados da Riot API para este jogador ainda.
            </p>
          </div>
        </template>

        <!-- Strengths & Weaknesses Grid -->
        <template x-if="playerMetrics && playerMetrics.n >= 1">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Continue assim -->
            <div>
              <h2 class="text-lg font-bold text-green-400 mb-4">✅ Continue assim</h2>
              <template x-if="strengths.length === 0">
                <div class="text-slate-500 text-sm italic">Nenhum destaque identificado nesta identidade.</div>
              </template>
              <template x-if="strengths.length > 0">
                <div class="space-y-3">
                  <template x-for="point in strengths" :key="point.metric">
                    <div class="bg-green-500/10 border border-green-500/30 rounded-lg p-4">
                      <div class="flex items-start justify-between mb-2">
                        <div>
                          <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-sm font-bold text-green-400" x-text="point.label"></h3>
                            <template x-if="point.rankImgUrl">
                              <img :src="point.rankImgUrl" class="w-5 h-5" :title="point.rankLabel">
                            </template>
                          </div>
                           <p class="text-xs text-slate-400 mt-1" x-text="point.comparison"></p>
                           <div class="flex items-center gap-1 mt-2 text-xs text-slate-500">
                             <span x-text="`${point.teamRank}º de ${point.teamSize}`"></span>
                           </div>
                         </div>
                         <div :class="`text-sm font-bold ${point.severity === 'high' ? 'text-green-400' : 'text-green-300'}`"
                              x-text="point.formatted"></div>
                       </div>
                     </div>
                   </template>
                 </div>
               </template>
             </div>

             <!-- Precisa melhorar -->
            <div>
              <h2 class="text-lg font-bold text-red-400 mb-4">⚠️ Precisa melhorar</h2>
              <template x-if="weaknesses.length === 0">
                <div class="text-slate-500 text-sm italic">Desempenho balanceado — sem áreas críticas de melhoria.</div>
              </template>
              <template x-if="weaknesses.length > 0">
                <div class="space-y-3">
                  <template x-for="point in weaknesses" :key="point.metric">
                    <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-4">
                      <div class="flex items-start justify-between mb-2">
                        <div>
                          <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-sm font-bold text-red-400" x-text="point.label"></h3>
                            <template x-if="point.rankImgUrl">
                              <img :src="point.rankImgUrl" class="w-5 h-5" :title="point.rankLabel">
                            </template>
                          </div>
                           <p class="text-xs text-slate-400 mt-1" x-text="point.comparison"></p>
                           <div class="flex items-center gap-1 mt-2 text-xs text-slate-500">
                             <span x-text="`${point.teamRank}º de ${point.teamSize}`"></span>
                           </div>
                         </div>
                         <div :class="`text-sm font-bold ${point.severity === 'high' ? 'text-red-400' : 'text-red-300'}`"
                              x-text="point.formatted"></div>
                       </div>
                     </div>
                   </template>
                 </div>
               </template>
             </div>

           </div>
         </template>

      </div>
    </template>

    <!-- Empty state -->
    <template x-if="!loading && players.length === 0">
      <div class="text-center py-12">
        <p class="text-slate-400 mb-4">Nenhum jogador com dados de Riot API encontrado.</p>
        <a href="/pages/import.html" class="text-yellow-400 hover:text-yellow-300 text-sm">Importar partidas →</a>
      </div>
    </template>

  </main>
</body>
</html>
