<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach – LoL Team Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/scripts/shared.js"></script>
  <script src="/scripts/rank-derivation.js"></script>
  <script src="/scripts/player-metrics.js"></script>
  <script src="/scripts/coach-page.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="coachPage" class="bg-slate-950 text-slate-100 min-h-screen">
<script src="/scripts/layout.js"></script>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- Loading state -->
    <div x-show="loading" class="flex items-center justify-center py-12">
      <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-yellow-500 mb-3"></div>
        <p class="text-slate-400">Carregando dados...</p>
      </div>
    </div>

    <!-- Error state -->
    <div x-show="error" class="bg-red-500/10 border border-red-500/30 rounded-lg p-4 mb-5">
      <p class="text-red-400" x-text="error"></p>
    </div>

    <!-- Main content -->
    <template x-if="!loading && !error && players.length > 0">
      <div>
        <!-- Header: Title + Description (Col 1) | Selectors in one line (Col 2, max 75%) -->
        <div class="mb-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
          <!-- Col 1: Title + Description (1 col) -->
          <div class="lg:col-span-1">
            <h1 class="text-3xl font-bold mb-3">🎓 Coach</h1>
            <p class="text-slate-400 text-sm">
              Análise automática de pontos fortes e fracos baseada em dados de todas as partidas com Riot API.
            </p>
          </div>
          
          <!-- Col 2: Player + Identity Selectors in one line (3 cols, max 75%) -->
          <div class="lg:col-span-3 flex flex-col lg:flex-row gap-4 lg:gap-8">
            <!-- Player Selector -->
            <div class="flex-1">
              <label class="text-xs text-slate-400 block mb-2">Jogador:</label>
              
              <!-- Desktop: Button group (hidden on mobile) -->
              <div class="hidden md:flex gap-1 flex-wrap">
                <template x-for="p in players" :key="p.id">
                  <button
                    @click="selectedPlayerId = p.id"
                    :class="`px-3 py-2 text-xs rounded border transition ${playerButtonClass(p)}`"
                    x-text="p.name">
                  </button>
                </template>
              </div>
              
              <!-- Mobile: Dropdown (hidden on desktop) -->
              <select x-model="selectedPlayerId" class="md:hidden w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-sm text-slate-100 cursor-pointer hover:border-slate-600">
                <template x-for="p in players" :key="p.id">
                  <option :value="p.id" x-text="p.name"></option>
                </template>
              </select>
            </div>
            
            <!-- Identity Selector -->
            <div class="flex-1">
              <label class="text-xs text-slate-400 block mb-2">Identidade:</label>
              
              <!-- Desktop: Button group (hidden on mobile) -->
              <div class="hidden md:flex gap-1 flex-wrap">
                <template x-for="l in lenses" :key="l.key">
                  <button
                    @click="lens = l.key"
                    :disabled="getIdentityGameCount(l.key) < 1"
                    :class="`px-3 py-2 text-xs rounded border transition ${identityButtonClass(l)}`"
                    x-text="l.label">
                  </button>
                </template>
              </div>
              
              <!-- Mobile: Dropdown (hidden on desktop) -->
              <select x-model="lens" class="md:hidden w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-sm text-slate-100 cursor-pointer hover:border-slate-600 disabled:opacity-50 disabled:cursor-not-allowed">
                <template x-for="l in lenses" :key="l.key">
                  <option :value="l.key" :disabled="getIdentityGameCount(l.key) < 1" x-text="l.label"></option>
                </template>
              </select>
            </div>
          </div>
        </div>

        <!-- Overview Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <template x-for="card in overviewCards" :key="card.label">
            <div :class="`bg-slate-900 border rounded-lg p-4 ${card.borderColor ?? 'border-slate-800'}`">
              <div class="text-xs text-slate-500 mb-2" x-text="card.label"></div>
              <div class="flex items-center gap-3 mb-1">
                <div :class="`text-2xl font-bold ${card.color}`" x-text="card.value"></div>
                <template x-if="card.imgUrl">
                  <img :src="card.imgUrl" class="w-8 h-8" :alt="card.label">
                </template>
              </div>
              <div class="text-xs text-slate-500" x-text="card.sub"></div>
            </div>
          </template>

          <!-- Identidade Dominante Card (Geral lens only) -->
          <template x-if="lens === 'geral' && bestIdentity">
            <div :class="`bg-slate-900 border rounded-lg p-4 ${RANK_BORDER_COLORS[bestIdentity.identRank.rankIdx] ?? 'border-slate-800'}`">
              <div class="text-xs text-slate-500 mb-2">Identidade Dominante</div>
              <div class="flex items-center gap-2">
                <div :class="`text-2xl font-bold ${RANK_COLORS[bestIdentity.identRank.rankIdx] ?? 'text-slate-300'}`" x-text="bestIdentity.label"></div>
                <img :src="bestIdentity.identRank.imgUrl" class="w-8 h-8" :title="bestIdentity.identRank.label">
              </div>
            </div>
          </template>
        </div>

        <!-- No data message -->
        <template x-if="playerMetrics && playerMetrics.n < 1">
          <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 text-center">
            <p class="text-slate-400">
              Nenhuma partida com dados da Riot API para este jogador ainda.
            </p>
          </div>
        </template>

        <!-- Analysis + Achievements -->
        <template x-if="playerMetrics && playerMetrics.n >= 1">
          <div>

            <!-- Conquistas row (full width, no title, trophy cards) -->
            <template x-if="achievements.length > 0">
              <div class="grid grid-cols-3 sm:grid-cols-6 gap-3 mb-8">
                <template x-for="achievement in achievements" :key="achievement.metric">
                  <div class="bg-yellow-500/5 border border-yellow-500/40 rounded-lg p-3 text-center cursor-default"
                       :title="`${achievement.label} | ${lenses.find(l => l.key === lens)?.label} | Entre ${achievement.teamSize} ${lenses.find(l => l.key === lens)?.unit}`">
                    <div class="text-xl mb-1">🏆</div>
                    <div class="text-xs font-medium text-yellow-300 mb-2 leading-tight" x-text="achievement.label"></div>
                    <div class="flex items-center justify-center gap-1.5">
                      <img :src="achievement.rankImgUrl" class="w-4 h-4" :alt="achievement.rankLabel">
                      <span class="text-xs font-bold text-yellow-200" x-text="achievement.formatted"></span>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- Analysis 2-col grid -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

              <!-- Continue assim -->
              <div>
                <h2 class="text-lg font-bold text-green-400 mb-4">✅ Continue assim</h2>
                <template x-if="strengths.length === 0">
                  <div class="text-slate-500 text-sm italic">Nenhum destaque identificado nesta identidade.</div>
                </template>
                <template x-if="strengths.length > 0">
                  <div class="space-y-2">
                    <template x-for="point in strengths" :key="point.metric">
                      <div :class="`bg-green-500/10 border rounded-lg px-4 py-3 ${point.borderColor}`">
                        <!-- Row 1: Métrica + Rank img | Valor (±delta%) -->
                        <div class="flex items-center justify-between">
                          <div class="flex items-center gap-2">
                            <span :class="`text-sm font-bold ${point.rankColor}`" x-text="point.label"></span>
                            <img :src="point.rankImgUrl" class="w-4 h-4" :title="point.rankLabel">
                          </div>
                          <div class="flex items-center gap-1.5">
                            <span :class="`text-sm font-bold ${point.rankColor}`" x-text="point.formatted"></span>
                            <template x-if="point.deltaDisplay">
                              <span :class="`text-xs ${point.deltaColor}`" x-text="`(${point.deltaDisplay})`"></span>
                            </template>
                          </div>
                        </div>
                        <!-- Row 2: Xº de Y | Média do time -->
                        <div class="flex items-center justify-between mt-1">
                          <span class="text-xs text-slate-500" x-text="`${point.teamRank}º de ${point.teamSize}`"></span>
                          <template x-if="point.teamAvgFormatted">
                            <span class="text-xs text-slate-500" x-text="`Média ${point.teamAvgFormatted}`"></span>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Pode melhorar -->
              <div>
                <h2 class="text-lg font-bold text-red-400 mb-4">⚠️ Pode melhorar</h2>
                <template x-if="weaknesses.length === 0">
                  <div class="text-slate-500 text-sm italic">Desempenho balanceado — sem áreas de melhoria identificadas.</div>
                </template>
                <template x-if="weaknesses.length > 0">
                  <div class="space-y-2">
                    <template x-for="point in weaknesses" :key="point.metric">
                      <div :class="`bg-red-500/10 border rounded-lg px-4 py-3 ${point.borderColor}`">
                        <!-- Row 1: Métrica + Rank img | Valor (±delta%) -->
                        <div class="flex items-center justify-between">
                          <div class="flex items-center gap-2">
                            <span :class="`text-sm font-bold ${point.rankColor}`" x-text="point.label"></span>
                            <img :src="point.rankImgUrl" class="w-4 h-4" :title="point.rankLabel">
                          </div>
                          <div class="flex items-center gap-1.5">
                            <span :class="`text-sm font-bold ${point.rankColor}`" x-text="point.formatted"></span>
                            <template x-if="point.deltaDisplay">
                              <span :class="`text-xs ${point.deltaColor}`" x-text="`(${point.deltaDisplay})`"></span>
                            </template>
                          </div>
                        </div>
                        <!-- Row 2: Xº de Y | Média do time -->
                        <div class="flex items-center justify-between mt-1">
                          <span class="text-xs text-slate-500" x-text="`${point.teamRank}º de ${point.teamSize}`"></span>
                          <template x-if="point.teamAvgFormatted">
                            <span class="text-xs text-slate-500" x-text="`Média ${point.teamAvgFormatted}`"></span>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

            </div>
          </div>
        </template>

      </div>
    </template>

    <!-- Empty state -->
    <template x-if="!loading && players.length === 0">
      <div class="text-center py-12">
        <p class="text-slate-400 mb-4">Nenhum jogador com dados de Riot API encontrado.</p>
        <a href="/pages/import.html" class="text-yellow-400 hover:text-yellow-300 text-sm">Importar partidas →</a>
      </div>
    </template>

  </main>
</body>
</html>
