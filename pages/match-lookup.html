<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Partida – Clash Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/scripts/shared.js"></script>
  <script src="/scripts/match-assistant.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="matchAssistant" class="bg-slate-950 text-slate-100 min-h-screen">
<script src="/scripts/layout.js"></script>

  <main class="max-w-3xl mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <a x-bind:href="returnHref()" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Voltar</a>
      <h1 class="text-xl font-bold">Buscar Partida</h1>
    </div>

    <!-- Config + search -->
    <div class="bg-slate-900 border border-slate-800 rounded-lg p-5 mb-6">
      <p class="text-sm text-slate-400 mb-4">
        Busca partidas recentes onde <strong class="text-slate-200">5 ou mais membros do elenco</strong> jogaram no mesmo time.
        Só precisa de uma chave de API da Riot válida.
      </p>

      <div class="flex gap-3 items-end flex-wrap">
        <div class="flex-1 min-w-48">
          <label class="block text-xs text-slate-400 mb-1">Riot API Key</label>
          <input type="password" x-model="apiKey" @change="saveKey()"
                 placeholder="RGAPI-…"
                 class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:border-yellow-500">
        </div>
        <button @click="fetch()" :disabled="loading || !apiKey"
                class="bg-yellow-500 hover:bg-yellow-400 disabled:opacity-50 text-slate-900 font-semibold px-5 py-2 rounded text-sm transition-colors whitespace-nowrap">
          <span x-show="!loading">🔍 Buscar partidas</span>
          <span x-show="loading" x-text="status"></span>
        </button>
      </div>
    </div>

    <!-- Results -->
    <div x-show="!loading && cards.length === 0 && status === ''"
         class="text-center text-slate-500 py-16 text-sm">
      Configure a API key e clique em "Buscar partidas"
    </div>

    <div x-show="!loading && cards.length === 0 && status !== ''"
         class="text-center text-slate-500 py-10 text-sm" x-text="status">
    </div>

    <div x-show="cards.length > 0" class="space-y-4">

      <p class="text-xs text-slate-500" x-text="status"></p>

      <template x-for="card in cards" :key="card.matchId">
        <div class="bg-slate-900 border rounded-lg p-4"
             :class="card.win ? 'border-green-800/60' : 'border-red-900/60'">

          <!-- Card header -->
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3 flex-wrap">
              <span class="font-bold px-2 py-0.5 rounded text-sm"
                    :class="card.win ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'"
                    x-text="card.win ? 'VITÓRIA' : 'DERROTA'"></span>
              <span class="text-slate-400 text-sm" x-text="card.side === 'Red' ? '🟥 Red' : '🟦 Blue'"></span>
              <span class="text-slate-400 text-sm" x-text="card.duration + ' min'"></span>
              <span class="text-slate-600 text-xs" x-text="card.date"></span>
            </div>
            <button @click="use(card)"
                    class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-semibold px-3 py-1.5 rounded text-sm transition-colors flex-shrink-0">
              Preencher formulário →
            </button>
          </div>

          <!-- Champion rows -->
          <div class="flex gap-1.5 mb-1">
            <template x-for="c in card.ourChamps" :key="c.name">
              <img :src="$store.champions.imgUrl(c.key)"
                   :title="c.name" :alt="c.name"
                   class="w-9 h-9 rounded object-cover"
                   onerror="this.style.display='none'">
            </template>
          </div>
          <div class="flex gap-1.5 mb-3">
            <template x-for="c in card.enemyChamps" :key="c.name">
              <img :src="$store.champions.imgUrl(c.key)"
                   :title="c.name" :alt="c.name"
                   class="w-7 h-7 rounded object-cover opacity-40"
                   onerror="this.style.display='none'">
            </template>
          </div>

          <!-- Meta info -->
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-x-4 gap-y-1 text-xs text-slate-400">
            <div x-show="card.topPlayer">
              Top Laner: <span class="text-slate-200" x-text="card.topPlayer"></span>
            </div>
            <div x-show="card.mvp">
              MVP: <span class="text-slate-200" x-text="card.mvp"></span>
            </div>
            <div x-show="card.mvcChampName">
              MVC: <span class="text-slate-200" x-text="card.mvcChampName"></span>
            </div>
            <div x-show="card.teamKills != null">
              K/D: <span class="text-slate-200" x-text="card.teamKills + ' / ' + card.teamDeaths"></span>
            </div>
            <div x-show="card.gd10 != null">
              GD@10: <span :class="card.gd10 > 0 ? 'text-green-400' : card.gd10 < 0 ? 'text-red-400' : 'text-slate-300'"
                           x-text="(card.gd10 > 0 ? '+' : '') + (card.gd10 ?? 0).toLocaleString('en')"></span>
            </div>
            <div x-show="card.gd20 != null">
              GD@20: <span :class="card.gd20 > 0 ? 'text-green-400' : card.gd20 < 0 ? 'text-red-400' : 'text-slate-300'"
                           x-text="(card.gd20 > 0 ? '+' : '') + (card.gd20 ?? 0).toLocaleString('en')"></span>
            </div>
            <div x-show="card.gdF != null">
              GD@F: <span :class="card.gdF > 0 ? 'text-green-400' : card.gdF < 0 ? 'text-red-400' : 'text-slate-300'"
                          x-text="(card.gdF > 0 ? '+' : '') + (card.gdF ?? 0).toLocaleString('en')"></span>
            </div>
            <div x-show="card.objFlow">
              Obj: <span class="text-slate-200 font-mono" x-text="card.objFlow"></span>
            </div>
          </div>

        </div>
      </template>
    </div>

  </main>

</body>
</html>
